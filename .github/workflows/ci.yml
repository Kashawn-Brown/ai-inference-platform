name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aiinfra
          POSTGRES_PASSWORD: aiinfra
          POSTGRES_DB: aiinfra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aiinfra -d aiinfra_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        # Pinned to a full version: setup-uv stopped publishing moving major
        # tags (@v8) at v8.0.0. Both this and checkout@v5 run on Node 24.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Black check
        run: uv run black --check .

      - name: Pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://aiinfra:aiinfra@localhost:5432/aiinfra_test
        run: uv run pytest

  docker-build:
    name: Docker compose build smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build gateway and worker images
        run: docker compose build
