name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Black check
        run: uv run black --check .

      - name: Pytest
        run: uv run pytest

  docker-build:
    name: Docker compose build smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build gateway and worker images
        run: docker compose build
