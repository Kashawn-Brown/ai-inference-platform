repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  # ruff + black run through `uv run` so they always use the versions pinned in
  # uv.lock — the same ones CI runs. Pinning hook revs here instead would drift
  # from the lockfile and let locally-committed code fail CI's format/lint check.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: black
        name: black
        entry: uv run black
        language: system
        types_or: [python, pyi]
        require_serial: true
