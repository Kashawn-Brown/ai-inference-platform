# Prometheus scrapes itself, the gateway (/metrics on its app port), and the
# worker (/metrics on its dedicated daemon-thread server, METRICS_PORT_WORKER).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: gateway
    static_configs:
      - targets:
          - gateway:8000

  - job_name: worker
    static_configs:
      - targets:
          - worker:9101
