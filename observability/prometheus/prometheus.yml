# Prometheus scrapes itself and the gateway (/metrics on its app port).
# The worker scrape config arrives in Phase 3, once the worker exposes /metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: gateway
    static_configs:
      - targets:
          - gateway:8000
